{% extends "base.html" %}

{% block title %}Edit Interview{% endblock %}

{% block content %}

<div class="auth-container fade-up">

    <div class="card auth-card">

        <div class="card-body">

            <div class="text-center mb-4">

                <i class="bi bi-pencil-square display-3 text-primary"></i>

                <h2 class="auth-title mt-3">

                    Edit Interview

                </h2>

                <p class="auth-subtitle">

                    {{ interview.job.company }} • {{ interview.job.role }}

                </p>

            </div>

            <form method="POST">

                <!-- Interview Date -->

                <div class="mb-3">

                    <label class="form-label">

                        Interview Date

                    </label>

                    <input
                        type="date"
                        class="form-control"
                        name="interview_date"
                        value="{{ interview.interview_date.strftime('%Y-%m-%d') }}"
                        required>

                </div>

                <!-- Interview Time -->

                <div class="mb-3">

                    <label class="form-label">

                        Interview Time

                    </label>

                    <input
                        type="time"
                        class="form-control"
                        name="interview_time"
                        value="{{ interview.interview_time.strftime('%H:%M') }}"
                        required>

                </div>

                <!-- Interview Type -->

                <div class="mb-3">

                    <label class="form-label">

                        Interview Type

                    </label>

                    <select
                        class="form-select"
                        name="interview_type"
                        required>

                        {% set types = [
                            "Recruiter Screen",
                            "HR",
                            "Technical",
                            "Manager",
                            "System Design",
                            "Behavioral",
                            "Panel",
                            "Final"
                        ] %}

                        {% for t in types %}

                        <option
                            value="{{ t }}"
                            {% if interview.interview_type == t %}selected{% endif %}>

                            {{ t }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <!-- Round -->

                <div class="mb-3">

                    <label class="form-label">

                        Round Number

                    </label>

                    <input
                        type="number"
                        class="form-control"
                        name="round_number"
                        value="{{ interview.round_number }}"
                        min="1"
                        required>

                </div>

                <!-- Status -->

                <div class="mb-3">

                    <label class="form-label">

                        Interview Status

                    </label>

                    <select
                        class="form-select"
                        id="status"
                        name="status">

                        <option value="Scheduled"
                            {% if interview.status=="Scheduled" %}selected{% endif %}>

                            Scheduled

                        </option>

                        <option value="Completed"
                            {% if interview.status=="Completed" %}selected{% endif %}>

                            Completed

                        </option>

                        <option value="Cancelled"
                            {% if interview.status=="Cancelled" %}selected{% endif %}>

                            Cancelled

                        </option>

                    </select>

                </div>

                <!-- Result -->

                <div class="mb-3">

                    <label class="form-label">

                        Result

                    </label>

                    <select
                        class="form-select"
                        id="result"
                        name="result">

                        <option value="No response"
                            {% if interview.result=="No response" %}selected{% endif %}>

                            Awaiting Feedback

                        </option>

                        <option value="Passed"
                            {% if interview.result=="Passed" %}selected{% endif %}>

                            Passed

                        </option>

                        <option value="Failed"
                            {% if interview.result=="Failed" %}selected{% endif %}>

                            Failed

                        </option>

                        <option value="Offer"
                            {% if interview.result=="Offer" %}selected{% endif %}>

                            Offer

                        </option>

                    </select>

                </div>

                <!-- Final Round -->

                <div class="form-check mb-4">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="finalRound"
                        name="is_final_round"
                        {% if interview.is_final_round %}checked{% endif %}>

                    <label
                        class="form-check-label"
                        for="finalRound">

                        Final Interview Round

                    </label>

                </div>

                <!-- Notes -->

                <div class="mb-4">

                    <label class="form-label">

                        Notes

                    </label>

                    <textarea
                        class="form-control"
                        rows="5"
                        name="notes">{{ interview.notes }}</textarea>

                </div>

                <div class="d-flex justify-content-between">

                    <a
                        href="{{ url_for('view_jobs') }}"
                        class="btn btn-outline-secondary">

                        <i class="bi bi-arrow-left"></i>

                        Back

                    </a>

                    <button
                        class="btn btn-primary"
                        type="submit">

                        <i class="bi bi-floppy"></i>

                        Update Interview

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}

{% block scripts %}

<script>

document.addEventListener("DOMContentLoaded", function(){

    const status = document.getElementById("status");

    const result = document.getElementById("result");

    function updateResultField(){

        if(status.value === "Completed"){

            result.disabled = false;

        }
        else{

            result.value = "No response";

            result.disabled = true;

        }

    }

    updateResultField();

    status.addEventListener("change", updateResultField);

});

</script>

{% endblock %}
