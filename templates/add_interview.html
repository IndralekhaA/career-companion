{% extends "base.html" %}

{% block title %}Add Interview{% endblock %}

{% block content %}

<div class="auth-container fade-up">

    <div class="card auth-card">

        <div class="card-body">

            <div class="text-center mb-4">

                <i class="bi bi-calendar-event display-3 text-primary"></i>

                <h2 class="auth-title mt-3">

                    Add Interview

                </h2>

                <p class="auth-subtitle">

                    {{ job.company }} • {{ job.role }}

                </p>

            </div>

            <form method="POST">

                <!-- Interview Date -->

                <div class="mb-3">

                    <label class="form-label">

                        Interview Date

                    </label>

                    <input
                        type="date"
                        class="form-control"
                        name="interview_date"
                        required>

                </div>

                <!-- Interview Time -->

                <div class="mb-3">

                    <label class="form-label">

                        Interview Time

                    </label>

                    <input
                        type="time"
                        class="form-control"
                        name="interview_time"
                        required>

                </div>

                <!-- Interview Type -->

                <div class="mb-3">

                    <label class="form-label">

                        Interview Type

                    </label>

                    <select
                        class="form-select"
                        name="interview_type"
                        required>

                        <option value="">Select Interview Type</option>

                        <option value="Recruiter Screen">

                            Recruiter Screen

                        </option>

                        <option value="HR">

                            HR

                        </option>

                        <option value="Technical">

                            Technical

                        </option>

                        <option value="Manager">

                            Hiring Manager

                        </option>

                        <option value="System Design">

                            System Design

                        </option>

                        <option value="Behavioral">

                            Behavioral

                        </option>

                        <option value="Panel">

                            Panel

                        </option>

                        <option value="Final">

                            Final

                        </option>

                    </select>

                </div>

                <!-- Round -->

                <div class="mb-3">

                    <label class="form-label">

                        Round Number

                    </label>

                    <input
                        type="number"
                        class="form-control"
                        name="round_number"
                        min="1"
                        value="1"
                        required>

                </div>

                <!-- Status -->

                <div class="mb-3">

                    <label class="form-label">

                        Interview Status

                    </label>

                    <select
                        class="form-select"
                        name="status"
                        required>

                        <option value="Scheduled">

                            Scheduled

                        </option>

                        <option value="Completed">

                            Completed

                        </option>

                        <option value="Cancelled">

                            Cancelled

                        </option>

                    </select>

                </div>

                <!-- Result -->

                <div class="mb-3">

                    <label class="form-label">

                        Result

                    </label>

                    <select
                        class="form-select"
                        name="result"
                        required>

                        <option value="No response">

                            Awaiting Feedback

                        </option>

                        <option value="Passed">

                            Passed

                        </option>

                        <option value="Failed">

                            Failed

                        </option>

                        <option value="Offer">

                            Offer

                        </option>

                    </select>

                </div>

                <!-- Final Round -->

                <div class="form-check mb-4">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="is_final_round"
                        id="finalRound">

                    <label
                        class="form-check-label"
                        for="finalRound">

                        This is the Final Interview Round

                    </label>

                </div>

                <!-- Notes -->

                <div class="mb-4">

                    <label class="form-label">

                        Notes

                    </label>

                    <textarea
                        class="form-control"
                        rows="5"
                        name="notes"
                        placeholder="Interviewers, preparation topics, feedback, questions asked, etc."></textarea>

                </div>

                <!-- Buttons -->

                <div class="d-flex justify-content-between">

                    <a
                        href="{{ url_for('view_jobs') }}"
                        class="btn btn-outline-secondary">

                        <i class="bi bi-arrow-left"></i>

                        Back

                    </a>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="bi bi-calendar-plus"></i>

                        Save Interview

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
