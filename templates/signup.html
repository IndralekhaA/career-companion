{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}

<div class="auth-container fade-up">

    <div class="card auth-card">

        <div class="card-body">

            <div class="text-center mb-4">

                <i class="bi bi-person-plus-fill display-3 text-primary"></i>

                <h2 class="auth-title mt-3">

                    Create Account

                </h2>

                <p class="auth-subtitle">

                    Start tracking your job applications smarter.

                </p>

            </div>

            <form method="POST">

                <!-- Username -->

                <div class="mb-3">

                    <label class="form-label">

                        Username

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-person"></i>

                        </span>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Choose a username"
                            required>

                    </div>

                </div>

                <!-- Email -->

                <div class="mb-3">

                    <label class="form-label">

                        Email Address

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-envelope"></i>

                        </span>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your email"
                            required>

                    </div>

                </div>

                <!-- Password -->

                <div class="mb-3">

                    <label class="form-label">

                        Password

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-lock"></i>

                        </span>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Create a password"
                            required>

                        <button
                            class="btn btn-outline-secondary"
                            type="button"
                            id="togglePassword">

                            <i class="bi bi-eye"></i>

                        </button>

                    </div>

                    <div class="form-text">

                        Minimum 8 characters with letters and numbers.

                    </div>

                </div>

                <!-- Confirm Password -->

                <div class="mb-4">

                    <label class="form-label">

                        Confirm Password

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-shield-lock"></i>

                        </span>

                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirm_password"
                            class="form-control"
                            placeholder="Confirm password"
                            required>

                    </div>

                    <small
                        id="passwordMessage"
                        class="text-muted">

                    </small>

                </div>

                <!-- Submit -->

                <div class="d-grid">

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg">

                        <i class="bi bi-person-check-fill me-2"></i>

                        Create Account

                    </button>

                </div>

            </form>

            <hr class="my-4">

            <div class="text-center">

                <p class="mb-0">

                    Already have an account?

                    <a
                        href="{{ url_for('login') }}"
                        class="fw-semibold">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block scripts %}

<script>

document.addEventListener("DOMContentLoaded", function(){

    // Password Show/Hide

    const toggle = document.getElementById("togglePassword");

    const password = document.getElementById("password");

    if(toggle){

        toggle.addEventListener("click", function(){

            if(password.type==="password"){

                password.type="text";

                this.innerHTML='<i class="bi bi-eye-slash"></i>';

            }else{

                password.type="password";

                this.innerHTML='<i class="bi bi-eye"></i>';

            }

        });

    }

    // Password Match Check

    const confirm=document.getElementById("confirmPassword");

    const message=document.getElementById("passwordMessage");

    function validatePasswords(){

        if(confirm.value===""){

            message.innerHTML="";

            return;

        }

        if(password.value===confirm.value){

            message.innerHTML="✔ Passwords match";

            message.className="text-success";

        }

        else{

            message.innerHTML="✖ Passwords do not match";

            message.className="text-danger";

        }

    }

    password.addEventListener("keyup",validatePasswords);

    confirm.addEventListener("keyup",validatePasswords);

});

</script>

{% endblock %}
