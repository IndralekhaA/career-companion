<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
</head>

<body>

    <h1>Login</h1>

    {% with messages = get_flashed_messages() %}

        {% if messages %}

            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}

        {% endif %}

    {% endwith %}

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</body>

</html>
