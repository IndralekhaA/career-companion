{% extends "base.html" %}

{% block title %}Edit Job{% endblock %}

{% block content %}

<div class="auth-container fade-up">

    <div class="card auth-card">

        <div class="card-body">

            <div class="text-center mb-4">

                <i class="bi bi-pencil-square display-3 text-primary"></i>

                <h2 class="auth-title mt-3">

                    Edit Job

                </h2>

                <p class="auth-subtitle">

                    Update your job application details.

                </p>

            </div>

            <form method="POST">

                <!-- Company -->

                <div class="mb-3">

                    <label class="form-label">

                        Company

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-building"></i>

                        </span>

                        <input
                            type="text"
                            class="form-control"
                            name="company"
                            value="{{ job.company }}"
                            required>

                    </div>

                </div>

                <!-- Role -->

                <div class="mb-3">

                    <label class="form-label">

                        Job Role

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-person-workspace"></i>

                        </span>

                        <input
                            type="text"
                            class="form-control"
                            name="role"
                            value="{{ job.role }}"
                            required>

                    </div>

                </div>

                <!-- Status -->

                <div class="mb-3">

                    <label class="form-label">

                        Application Status

                    </label>


                    <input
                        class="form-control"
                        value="{{ job.status }}"
                        readonly>

                    <div class="form-text text-muted">

                        Status is automatically updated from interview progress.

                    </div>

                  <!--- <select
                        class="form-select"
                        name="status"
                        required>

                        <option value="Applied"
                            {% if job.status == "Applied" %}selected{% endif %}>
                            Applied
                        </option>

                        <option value="Interview"
                            {% if job.status == "Interview" %}selected{% endif %}>
                            Interview
                        </option>

                        <option value="Offer"
                            {% if job.status == "Offer" %}selected{% endif %}>
                            Offer
                        </option>

                        <option value="Rejected"
                            {% if job.status == "Rejected" %}selected{% endif %}>
                            Rejected
                        </option>

                    </select>

                </div> -->

                <!-- Date Applied -->

                <div class="mb-3">

                    <label class="form-label">

                        Date Applied

                    </label>

                    <input
                        type="date"
                        class="form-control"
                        name="date_applied"
                        value="{{ job.date_applied.strftime('%Y-%m-%d') if job.date_applied else '' }}"
                        required>

                </div>

                <!-- Notes -->

                <div class="mb-4">

                    <label class="form-label">

                        Notes

                    </label>

                    <textarea
                        class="form-control"
                        rows="5"
                        name="notes"
                        placeholder="Recruiter information, salary, links, interview prep, etc.">{{ job.notes or '' }}</textarea>

                </div>

                <!-- Buttons -->

                <div class="d-flex justify-content-between">

                    <a
                        href="{{ url_for('view_jobs') }}"
                        class="btn btn-outline-secondary">

                        <i class="bi bi-arrow-left"></i>

                        Cancel

                    </a>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="bi bi-check-circle"></i>

                        Update Job

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
